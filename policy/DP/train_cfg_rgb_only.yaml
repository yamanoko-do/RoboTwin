# train_cfg.yaml — Single source of truth for all training parameters.
#
# Usage:
#   bash train_eval_loop.sh cfg=train_cfg.yaml
#
# Three observation configs available:
#   A (RGB only, 3-view):            cfg=train_cfg.yaml
#   B (RGB+depth, 3-view):           cfg=train_cfg_threeview.yaml
#   C (RGB+depth, head-only):        cfg=train_cfg_firstview.yaml
#
# CLI overrides still work (highest priority):
#   bash train_eval_loop.sh cfg=train_cfg.yaml epochs=1000 device=0,1,2,3

# ==================== Hydra Config (determines obs_encoder & task structure) ====================
hydra:
  config_name: only_RGB_actdim14   # Options: only_RGB_actdim14 | threeview_rgbdepth_actdim_14 | firstview_rgbdepth_actdim_14

# ==================== Task & Data ====================
task:
  name: move_playingcard_away            # Task name (e.g. move_playingcard_away)
  config: demo_clean                     # Task config (e.g. demo_clean)
  zarr_path: /mnt/workspace/yama/RoboTwin/policy/DP/data/move_playingcard_away-demo_clean-50.zarr

# ==================== Pipeline (train_eval_loop.sh) ====================
pipeline:
  total_epochs: 500
  eval_every: 50
  eval_episodes: 8
  device: "0,1,2,3,4,5,6,7"
  seed: 42
  head_camera_type: D435
  experiment_name: "20260502_RGB_only"        # Output dir name (default: train_eval_{task}_{config})

# ==================== Hydra / Training ====================
# These map 1:1 to Hydra config keys. The shell script passes them as
# torchrun overrides, so you only need to edit values here.
training:
  num_epochs: 500            # Per-round epochs (overridden by shell to THIS_ROUND)
  lr_total_epochs: 500       # Total epochs for LR scheduler (should match pipeline.total_epochs)
  dist_mode: True
  resume: True
  seed: 42
  lr_scheduler: cosine
  lr_warmup_steps: 500
  gradient_accumulate_every: 1
  use_ema: True
  freeze_encoder: True
  eval_every: 1
  eval_episodes: 8
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  checkpoint_every: 10
  log_every: 10
  debug: False

# ==================== Optimizer ====================
optimizer:
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

# ==================== Dataloader ====================
dataloader:
  batch_size: 48
  num_workers: 0
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 16
  num_workers: 0
  shuffle: False
  pin_memory: True
  persistent_workers: False

# ==================== Policy ====================
policy:
  horizon: 8
  n_obs_steps: 3
  n_action_steps: 6
  n_latency_steps: 0
  obs_as_global_cond: True
  num_inference_steps: 100
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True

# ==================== Dataset ====================
dataset:
  val_ratio: 0.02
  max_train_episodes: null

# ==================== Logging ====================
logging:
  project: diffusion_policy_debug
  resume: True
  mode: online
  id: null
  group: null

# ==================== Eval (passed to eval_checkpoint.py) ====================
eval:
  instruction_type: unseen
