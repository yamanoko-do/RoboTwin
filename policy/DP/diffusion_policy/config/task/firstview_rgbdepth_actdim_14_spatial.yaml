name: task_config

image_shape: &image_shape [3, -1, -1]
depth_shape: &depth_shape [1, -1, -1]
shape_meta: &shape_meta
  # Config C: human-like — only head camera with depth (spatial features variant)
  obs:
    head_cam:
      shape: *image_shape
      type: rgb
    head_depth:
      shape: *depth_shape
      type: depth
    agent_pos:
      shape: [14]
      type: low_dim
  action:
    shape: [14]

env_runner:
  _target_: diffusion_policy.env_runner.pusht_image_runner.PushTImageRunner
  n_train: 6
  n_train_vis: 2
  train_start_seed: 0
  n_test: 50
  n_test_vis: 4
  legacy_test: True
  test_start_seed: 100000
  max_steps: 300
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 10
  past_action: ${past_action_visible}
  n_envs: null

dataset:
  _target_: diffusion_policy.dataset.robot_image_dataset.RobotImageDataset
  zarr_path: data/useless.zarr
  batch_size: ${dataloader.batch_size}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
  depth_scale: 1000.0
  preextracted_rgbd_feat_keys:
    head_cam: head_cam_lingbot_cls_rgbd
  preextracted_rgbd_spatial_keys:
    head_cam: head_cam_lingbot_spatial_rgbd
